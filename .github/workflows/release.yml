name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write
  pages: write

jobs:
  build-macos:
    runs-on: macos-15
    timeout-minutes: 120
    env:
      PPU_VERSION: ${{ github.event.inputs.version }}
    steps:
      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be in vX.Y.Z format (e.g. v1.0.0)"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract build info
        id: info
        run: |
          GHOSTTY_BUILD=$(git rev-list --count HEAD)
          GHOSTTY_COMMIT=$(git rev-parse --short HEAD)
          echo "build=$GHOSTTY_BUILD" >> "$GITHUB_OUTPUT"
          echo "commit=$GHOSTTY_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: true

      - name: Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_26.2.app
          xcodebuild -version

      # Build the Zig framework that the Swift app depends on
      - name: Build GhosttyKit
        env:
          GHOSTTY_VERSION: ${{ github.event.inputs.version }}
        run: |
          VERSION=${GHOSTTY_VERSION#v}
          nix develop -c \
            zig build \
            -Doptimize=ReleaseFast \
            -Demit-macos-app=false \
            -Dversion-string=${VERSION}

      # Build the native macOS app via Xcode
      - name: Build Ghostty.app
        run: |
          cd macos
          xcodebuild -target Ghostty -configuration Release

      - name: Update Info.plist
        env:
          GHOSTTY_BUILD: ${{ steps.info.outputs.build }}
          GHOSTTY_COMMIT: ${{ steps.info.outputs.commit }}
        run: |
          VERSION=${PPU_VERSION#v}
          PLIST="macos/build/Release/Ghostty.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :GhosttyCommit $GHOSTTY_COMMIT" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GHOSTTY_BUILD" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$PLIST"

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" build.keychain

      - name: Codesign app bundle
        env:
          MACOS_CERTIFICATE_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
        run: |
          # Sign the dock tile plugin
          /usr/bin/codesign --verbose -f -s "$MACOS_CERTIFICATE_NAME" -o runtime \
            "macos/build/Release/Ghostty.app/Contents/PlugIns/DockTilePlugin.plugin"

          # Sign the main app bundle
          /usr/bin/codesign --verbose -f -s "$MACOS_CERTIFICATE_NAME" -o runtime \
            --entitlements "macos/Ghostty.entitlements" \
            macos/build/Release/Ghostty.app

      - name: Create DMG
        env:
          MACOS_CERTIFICATE_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
        run: |
          npm install --global create-dmg
          create-dmg \
            --identity="$MACOS_CERTIFICATE_NAME" \
            ./macos/build/Release/Ghostty.app \
            ./
          mv ./Ghostty*.dmg ./GhosttyProPlusUltra.dmg

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "GhosttyProPlusUltra.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "GhosttyProPlusUltra.dmg"
          xcrun stapler staple "macos/build/Release/Ghostty.app"

      - name: Zip app for GitHub Release
        run: |
          cd macos/build/Release
          zip -9 -r --symlinks ../../../GhosttyProPlusUltra-macos-universal.zip Ghostty.app

      - name: Setup Sparkle
        run: |
          mkdir -p .action/sparkle
          cd .action/sparkle
          curl -sL https://github.com/sparkle-project/Sparkle/releases/download/2.9.0/Sparkle-2.9.0.tar.xz -o sparkle.tar.xz
          tar xf sparkle.tar.xz
          echo "$(pwd)/bin" >> "$GITHUB_PATH"

      - name: Generate Sparkle signature
        id: sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          echo "$SPARKLE_PRIVATE_KEY" > sparkle.key
          SIGNATURE=$(sign_update -f sparkle.key GhosttyProPlusUltra.dmg)
          rm sparkle.key
          echo "signature=$SIGNATURE" >> "$GITHUB_OUTPUT"
          DMG_SIZE=$(stat -f%z GhosttyProPlusUltra.dmg)
          echo "dmg_size=$DMG_SIZE" >> "$GITHUB_OUTPUT"

      - name: Generate appcast.xml
        env:
          GHOSTTY_BUILD: ${{ steps.info.outputs.build }}
          SPARKLE_SIG: ${{ steps.sparkle.outputs.signature }}
          DMG_SIZE: ${{ steps.sparkle.outputs.dmg_size }}
        run: |
          VERSION=${PPU_VERSION#v}
          RELEASE_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S %z")
          DMG_URL="https://github.com/Hankyone/ghostty-pro-plus-ultra/releases/download/${PPU_VERSION}/GhosttyProPlusUltra.dmg"

          cat > appcast.xml << APPCAST_EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Ghostty Pro Plus Ultra</title>
              <link>https://hankyone.github.io/ghostty-pro-plus-ultra/appcast.xml</link>
              <description>Updates for Ghostty Pro Plus Ultra</description>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${RELEASE_DATE}</pubDate>
                <sparkle:version>${GHOSTTY_BUILD}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <enclosure
                  url="${DMG_URL}"
                  ${SPARKLE_SIG}
                  length="${DMG_SIZE}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          APPCAST_EOF

      - name: Publish appcast to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch or create gh-pages branch
          git fetch origin gh-pages || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages

          # Clean everything except .git
          git rm -rf . 2>/dev/null || true
          git checkout main -- .gitignore 2>/dev/null || true

          # Copy appcast
          cp /Users/runner/work/ghostty-pro-plus-ultra/ghostty-pro-plus-ultra/appcast.xml appcast.xml 2>/dev/null || cp appcast.xml . 2>/dev/null || true

          git add appcast.xml
          git commit -m "Update appcast for ${PPU_VERSION}" || echo "No changes to commit"
          git push origin gh-pages

          # Return to main branch
          git checkout main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Ghostty Pro Plus Ultra ${{ github.event.inputs.version }}
          draft: true
          files: |
            GhosttyProPlusUltra.dmg
            GhosttyProPlusUltra-macos-universal.zip
